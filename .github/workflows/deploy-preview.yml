name: Deploy Preview

on:
  push:
    branches: [preview]

jobs:
  deploy-vercel:
    name: Deploy to Vercel (Preview)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }} --scope=8lines

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }} --scope=8lines
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}
          SKIP_ENV_VALIDATION: "1"

      - name: Deploy
        run: vercel deploy --prebuilt --archive=tgz --token=${{ secrets.VERCEL_TOKEN }} --scope=8lines
