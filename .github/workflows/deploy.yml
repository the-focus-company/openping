name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-convex:
    name: Deploy Convex
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Deploy Convex
        run: npx convex deploy
        env:
          CONVEX_DEPLOY_KEY: ${{ secrets.CONVEX_DEPLOY_KEY }}

  deploy-knowledge:
    name: Deploy Knowledge Engine
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for knowledge-engine changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^services/knowledge-engine/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Fly.io CLI
        if: steps.changes.outputs.changed == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Graphiti (main) to Fly.io
        if: steps.changes.outputs.changed == 'true'
        run: cd services/knowledge-engine && flyctl deploy -c graphiti-main.fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
