services:
  graphiti:
    image: zepai/graphiti:latest
    restart: unless-stopped
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://localhost:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthcheck || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  knowledge-engine:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      GRAPHITI_API_URL: http://graphiti:8000
      NEO4J_URI: ${NEO4J_URI:-bolt://localhost:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      PORT: "8001"
      NODE_ENV: ${NODE_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "8001:8001"
    depends_on:
      graphiti:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8001/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
