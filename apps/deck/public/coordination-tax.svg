<svg viewBox="0 0 1000 600" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" style="font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <style>
        /* Import Outfit font */
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&amp;display=swap');

        /* SVG Animations and Styles */
        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.8; }
            100% { transform: scale(1.1); opacity: 1; }
        }

        /* Faster and sharper ping animation */
        @keyframes pingFloat {
            0% { opacity: 0; transform: translate(0, 10px); }
            15% { opacity: 0.9; transform: translate(0, 0); }
            35% { opacity: 0.9; transform: translate(0, -10px); }
            55% { opacity: 0; transform: translate(0, -15px); }
            100% { opacity: 0; transform: translate(0, -15px); }
        }

        .bottleneck-core {
            fill: #ff3366;
            transform-origin: 500px 300px;
            animation: pulse 1.2s infinite alternate ease-in-out;
        }

        .bottleneck-glow {
            fill: rgba(255, 51, 102, 0.15);
            transform-origin: 500px 300px;
            animation: pulse 1.2s infinite alternate ease-in-out;
            animation-delay: 0.3s;
        }

        .spaghetti-line {
            stroke: #ff3366;
            stroke-width: 1.5;
            opacity: 0.25;
            fill: none;
        }

        .cross-line {
            stroke: #ff3366;
            stroke-width: 1;
            opacity: 0.15;
            fill: none;
        }

        .outcome-line {
            stroke: #555;
            stroke-width: 2;
            stroke-dasharray: 6 6;
            fill: none;
        }

        text {
            fill: #e0e0e0;
        }

        .label-title {
            font-size: 14px;
            font-weight: 600;
        }

        .label-title-center {
            font-size: 16px;
            font-weight: 700;
        }

        .label-warning {
            font-size: 12px;
            fill: #ff3366;
            font-weight: 500;
        }

        /* Ping Cloud Styles */
        .ping {
            font-size: 11px;
            fill: #888;
            opacity: 0;
            animation-name: pingFloat;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
            text-anchor: end;
            letter-spacing: 0.2px;
        }

        .ping.alert {
            fill: #e6395e;
            font-weight: 600;
        }

        .ping.small {
            font-size: 9px;
            fill: #555;
        }
    </style>

    <defs>
        <!-- Glow Filter -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="8" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="glow-strong" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="15" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <!-- Left to Center Paths (Adjusted start points to account for removed circles) -->
        <path id="path-s" d="M 230 150 C 400 150, 350 300, 500 300" />
        <path id="path-j" d="M 230 250 C 400 250, 350 300, 500 300" />
        <path id="path-e" d="M 230 350 C 400 350, 350 300, 500 300" />
        <path id="path-m" d="M 230 450 C 400 450, 350 300, 500 300" />

        <!-- Extra Spaghetti Paths -->
        <path id="path-c1" d="M 230 150 C 350 220, 300 450, 500 300" />
        <path id="path-c2" d="M 230 450 C 350 380, 300 150, 500 300" />
        <path id="path-c3" d="M 230 250 C 300 100, 450 150, 500 300" />
        <path id="path-c4" d="M 230 350 C 300 500, 450 450, 500 300" />

        <!-- Left Cross-Talk Paths -->
        <path id="cross-1" d="M 230 150 C 270 200, 270 200, 230 250" />
        <path id="cross-2" d="M 230 250 C 270 300, 270 300, 230 350" />
        <path id="cross-3" d="M 230 350 C 270 400, 270 400, 230 450" />
        <path id="cross-4" d="M 230 450 C 180 300, 180 300, 230 150" />

        <!-- Center to Right Paths -->
        <path id="out-1" d="M 500 300 C 650 300, 600 150, 800 150" />
        <path id="out-2" d="M 500 300 C 650 300, 650 300, 800 300" />
        <path id="out-3" d="M 500 300 C 650 300, 600 450, 800 450" />
    </defs>

    <!-- Render Paths -->
    <g id="spaghetti-lines">
        <use href="#path-s" class="spaghetti-line" />
        <use href="#path-j" class="spaghetti-line" />
        <use href="#path-e" class="spaghetti-line" />
        <use href="#path-m" class="spaghetti-line" />
        <use href="#path-c1" class="spaghetti-line" />
        <use href="#path-c2" class="spaghetti-line" />
        <use href="#path-c3" class="spaghetti-line" />
        <use href="#path-c4" class="spaghetti-line" />
        <use href="#cross-1" class="cross-line" />
        <use href="#cross-2" class="cross-line" />
        <use href="#cross-3" class="cross-line" />
        <use href="#cross-4" class="cross-line" />
    </g>

    <g id="outcome-lines">
        <use href="#out-1" class="outcome-line" />
        <use href="#out-2" class="outcome-line" />
        <use href="#out-3" class="outcome-line" />
    </g>

    <!-- Animated Data Packets (Fast In) -->
    <g id="data-in" fill="#ff3366" filter="url(#glow)">
        <circle r="3"><animateMotion dur="1s" repeatCount="indefinite"><mpath href="#path-s"/></animateMotion></circle>
        <circle r="2"><animateMotion dur="1.2s" begin="0.4s" repeatCount="indefinite"><mpath href="#path-s"/></animateMotion></circle>
        <circle r="2.5"><animateMotion dur="1.1s" begin="0.2s" repeatCount="indefinite"><mpath href="#path-j"/></animateMotion></circle>
        <circle r="3"><animateMotion dur="0.9s" begin="0.7s" repeatCount="indefinite"><mpath href="#path-j"/></animateMotion></circle>
        <circle r="3"><animateMotion dur="1.3s" begin="0.1s" repeatCount="indefinite"><mpath href="#path-e"/></animateMotion></circle>
        <circle r="1.5"><animateMotion dur="1s" begin="0.8s" repeatCount="indefinite"><mpath href="#path-e"/></animateMotion></circle>
        <circle r="2"><animateMotion dur="0.8s" begin="0.3s" repeatCount="indefinite"><mpath href="#path-m"/></animateMotion></circle>
        <circle r="3"><animateMotion dur="1.4s" begin="0.6s" repeatCount="indefinite"><mpath href="#path-m"/></animateMotion></circle>

        <circle r="2" opacity="0.6"><animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#path-c1"/></animateMotion></circle>
        <circle r="2" opacity="0.6"><animateMotion dur="1.4s" begin="0.5s" repeatCount="indefinite"><mpath href="#path-c2"/></animateMotion></circle>
        <circle r="2" opacity="0.6"><animateMotion dur="1.6s" begin="0.2s" repeatCount="indefinite"><mpath href="#path-c3"/></animateMotion></circle>
        <circle r="2" opacity="0.6"><animateMotion dur="1.7s" begin="0.8s" repeatCount="indefinite"><mpath href="#path-c4"/></animateMotion></circle>

        <circle r="1.5" opacity="0.5"><animateMotion dur="2s" repeatCount="indefinite"><mpath href="#cross-1"/></animateMotion></circle>
        <circle r="1.5" opacity="0.5"><animateMotion dur="2.2s" repeatCount="indefinite"><mpath href="#cross-2"/></animateMotion></circle>
        <circle r="1.5" opacity="0.5"><animateMotion dur="1.8s" repeatCount="indefinite"><mpath href="#cross-3"/></animateMotion></circle>
    </g>

    <!-- Animated Data Packets (Slow Out) -->
    <g id="data-out" fill="#777">
        <circle r="2.5"><animateMotion dur="4s" repeatCount="indefinite"><mpath href="#out-1"/></animateMotion></circle>
        <circle r="2"><animateMotion dur="4.5s" begin="1.5s" repeatCount="indefinite"><mpath href="#out-1"/></animateMotion></circle>
        <circle r="2.5"><animateMotion dur="5s" repeatCount="indefinite"><mpath href="#out-2"/></animateMotion></circle>
        <circle r="2"><animateMotion dur="6s" begin="0.5s" repeatCount="indefinite"><mpath href="#out-3"/></animateMotion></circle>
        <circle r="2.5"><animateMotion dur="4.8s" begin="2.5s" repeatCount="indefinite"><mpath href="#out-3"/></animateMotion></circle>
    </g>

    <!-- Center Human Router Zone -->
    <g id="bottleneck-zone">
        <!-- Core Node -->
        <circle cx="500" cy="300" r="45" class="bottleneck-glow" filter="url(#glow-strong)" />
        <circle cx="500" cy="300" r="28" class="bottleneck-core" filter="url(#glow)" />

        <!-- Human Silhouette Icon -->
        <g fill="#ffffff" opacity="0.95">
            <circle cx="500" cy="293" r="6" />
            <path d="M 488 312 C 488 303, 492 298, 500 298 C 508 298, 512 303, 512 312 Z" />
        </g>

        <!-- Labels -->
        <text x="500" y="380" text-anchor="middle" class="label-title-center" fill="#fff">The Human Router</text>
        <text x="500" y="400" text-anchor="middle" class="label-warning">Cognitive Overload</text>
    </g>

    <!-- Information Cloud (Pings floating around sources) shifted closer to text -->
    <g id="information-cloud" transform="translate(0, 0)">
        <!-- Slack Area -->
        <text x="180" y="100" class="ping" style="animation-delay: 0.1s; animation-duration: 2.2s;">Status check</text>
        <text x="160" y="115" class="ping alert" style="animation-delay: 1.0s; animation-duration: 2.8s;">@mention</text>
        <text x="195" y="130" class="ping" style="animation-delay: 0.5s; animation-duration: 2.5s;">Direct message</text>
        <text x="150" y="145" class="ping small" style="animation-delay: 1.5s; animation-duration: 3.1s;">Where are we on X?</text>
        <text x="185" y="160" class="ping" style="animation-delay: 0.3s; animation-duration: 2.3s;">Thread reply</text>
        <text x="170" y="175" class="ping" style="animation-delay: 1.2s; animation-duration: 2.6s;">Quick question</text>
        <text x="190" y="190" class="ping small" style="animation-delay: 0.6s; animation-duration: 1.9s;">FYA</text>

        <!-- Jira Area -->
        <text x="180" y="210" class="ping alert" style="animation-delay: 0.8s; animation-duration: 2.4s;">Change in priority</text>
        <text x="160" y="225" class="ping" style="animation-delay: 0.2s; animation-duration: 2.7s;">New comment</text>
        <text x="195" y="240" class="ping" style="animation-delay: 1.7s; animation-duration: 2.5s;">Ticket reassigned</text>
        <text x="150" y="255" class="ping alert" style="animation-delay: 0.5s; animation-duration: 2.9s;">Blocker</text>
        <text x="185" y="270" class="ping small" style="animation-delay: 1.1s; animation-duration: 2.6s;">Story points updated</text>
        <text x="165" y="285" class="ping" style="animation-delay: 0.1s; animation-duration: 2.2s;">Needs review</text>
        <text x="190" y="300" class="ping small" style="animation-delay: 1.4s; animation-duration: 3.0s;">PR merged</text>

        <!-- Email Area -->
        <text x="180" y="315" class="ping" style="animation-delay: 0.9s; animation-duration: 2.5s;">New data available</text>
        <text x="160" y="330" class="ping alert" style="animation-delay: 0.3s; animation-duration: 2.8s;">Client feedback</text>
        <text x="195" y="345" class="ping alert" style="animation-delay: 1.9s; animation-duration: 2.4s;">System alert</text>
        <text x="150" y="360" class="ping" style="animation-delay: 0.7s; animation-duration: 2.9s;">Approval needed</text>
        <text x="185" y="375" class="ping small" style="animation-delay: 0.4s; animation-duration: 2.7s;">Newsletter</text>
        <text x="170" y="390" class="ping" style="animation-delay: 1.6s; animation-duration: 2.3s;">Following up</text>
        <text x="190" y="405" class="ping alert" style="animation-delay: 1.1s; animation-duration: 3.1s;">Deployment failed</text>

        <!-- Meetings Area -->
        <text x="180" y="420" class="ping" style="animation-delay: 0.5s; animation-duration: 2.4s;">Meeting rescheduled</text>
        <text x="160" y="435" class="ping" style="animation-delay: 1.3s; animation-duration: 2.7s;">Quick sync?</text>
        <text x="195" y="450" class="ping alert" style="animation-delay: 0.9s; animation-duration: 2.6s;">Outdated security check</text>
        <text x="150" y="465" class="ping" style="animation-delay: 0.2s; animation-duration: 2.3s;">Decline</text>
        <text x="185" y="480" class="ping small" style="animation-delay: 1.8s; animation-duration: 2.8s;">No agenda</text>
        <text x="170" y="495" class="ping" style="animation-delay: 1.0s; animation-duration: 2.5s;">Can we move this?</text>
        <text x="190" y="510" class="ping small" style="animation-delay: 0.6s; animation-duration: 2.7s;">Action items</text>
    </g>

    <!-- Left Nodes (Sources) - Text Only -->
    <g id="nodes-left">
        <!-- Slack -->
        <text x="200" y="154" text-anchor="middle" class="label-title">Slack</text>

        <!-- Jira -->
        <text x="200" y="254" text-anchor="middle" class="label-title">Jira</text>

        <!-- Email -->
        <text x="200" y="354" text-anchor="middle" class="label-title">Email</text>

        <!-- Meetings -->
        <text x="200" y="454" text-anchor="middle" class="label-title">Meetings</text>
    </g>

    <!-- Right Nodes (Outcomes) - Text Only -->
    <g id="nodes-right">
        <!-- Product Launch -->
        <text x="800" y="145" text-anchor="start" class="label-title">Product Launch</text>
        <text x="800" y="162" text-anchor="start" class="label-warning">Delayed by 3 weeks</text>

        <!-- Q3 Campaign -->
        <text x="800" y="295" text-anchor="start" class="label-title">Q3 Campaign</text>
        <text x="800" y="312" text-anchor="start" class="label-warning">Lost Context</text>

        <!-- Client Delivery -->
        <text x="800" y="445" text-anchor="start" class="label-title">Client Delivery</text>
        <text x="800" y="462" text-anchor="start" class="label-warning">Scope Reduced</text>
    </g>
</svg>
