openapi: 3.0.3
info:
  title: PING Platform Convex API
  description: >
    API documentation for the PING Platform backend powered by Convex.
    Queries are invoked via `POST /api/query`, mutations via `POST /api/mutation`.
    HTTP webhook routes are standard REST endpoints.
  version: 1.0.0

servers:
  - url: https://<your-deployment>.convex.cloud
    description: Convex deployment

security:
  - BearerAuth: []

tags:
  - name: Messages
    description: Send and list messages in channels
  - name: Channels
    description: Create, manage, and browse channels
  - name: Users
    description: User lookup and management
  - name: Workspaces
    description: Workspace creation and lookup
  - name: Conversations
    description: Direct messages and group conversations
  - name: Drafts
    description: Message draft management
  - name: Inbox
    description: AI-generated inbox summaries
  - name: Integrations
    description: Integration objects (GitHub PRs, Linear tickets)
  - name: Presence
    description: Online presence and user status
  - name: ProactiveAlerts
    description: AI-generated proactive alerts
  - name: Reactions
    description: Emoji reactions on messages
  - name: Typing
    description: Typing indicators
  - name: Webhooks
    description: Inbound webhook endpoints (WorkOS, GitHub, Linear)
  - name: Agent API
    description: REST endpoints for external AI agent connectivity (Claude Code, Codex, etc.)

paths:
  # ── Messages ──────────────────────────────────────────────

  "/api/mutation#messages:send":
    post:
      operationId: messages_send
      summary: Send a message to a channel
      tags: [Messages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "messages:send"
              args:
                channelId: "k17abc123def456"
                body: "Hello, world!"
              format: json
      responses:
        "200":
          description: The ID of the created message
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Convex document ID of the new message

  "/api/query#messages:listByChannel":
    post:
      operationId: messages_listByChannel
      summary: List messages in a channel (newest first)
      tags: [Messages]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "messages:listByChannel"
              args:
                channelId: "k17abc123def456"
                limit: 50
              format: json
      responses:
        "200":
          description: Array of message documents
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: array
                        items:
                          $ref: "#/components/schemas/Message"

  # ── Channels ──────────────────────────────────────────────

  "/api/mutation#channels:create":
    post:
      operationId: channels_create
      summary: Create a new public channel
      tags: [Channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:create"
              args:
                name: "design"
                description: "Design team discussions"
              format: json
      responses:
        "200":
          description: The ID of the created channel
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Convex document ID

  "/api/query#channels:list":
    post:
      operationId: channels_list
      summary: List all non-archived public channels in the workspace
      tags: [Channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "channels:list"
              args: {}
              format: json
      responses:
        "200":
          description: Array of channels with membership and unread info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: array
                        items:
                          allOf:
                            - $ref: "#/components/schemas/Channel"
                            - type: object
                              properties:
                                isMember:
                                  type: boolean
                                unreadCount:
                                  type: number

  "/api/query#channels:get":
    post:
      operationId: channels_get
      summary: Get a single channel by ID
      tags: [Channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "channels:get"
              args:
                channelId: "k17abc123def456"
              format: json
      responses:
        "200":
          description: The channel document
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        $ref: "#/components/schemas/Channel"

  "/api/mutation#channels:join":
    post:
      operationId: channels_join
      summary: Join a channel
      tags: [Channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:join"
              args:
                channelId: "k17abc123def456"
              format: json
      responses:
        "200":
          description: The channel-member document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Convex document ID

  "/api/mutation#channels:leave":
    post:
      operationId: channels_leave
      summary: Leave a channel (cannot leave default channels)
      tags: [Channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:leave"
              args:
                channelId: "k17abc123def456"
              format: json
      responses:
        "200":
          description: Success (void)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvexResponse"

  "/api/mutation#channels:archive":
    post:
      operationId: channels_archive
      summary: Archive a channel (owner or admin only)
      tags: [Channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:archive"
              args:
                channelId: "k17abc123def456"
              format: json
      responses:
        "200":
          description: Success (void)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvexResponse"

  "/api/mutation#channels:unarchive":
    post:
      operationId: channels_unarchive
      summary: Unarchive a channel (owner or admin only)
      tags: [Channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:unarchive"
              args:
                channelId: "k17abc123def456"
              format: json
      responses:
        "200":
          description: Success (void)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvexResponse"

  "/api/mutation#channels:invite":
    post:
      operationId: channels_invite
      summary: Invite users to a channel
      tags: [Channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:invite"
              args:
                channelId: "k17abc123def456"
                userIds:
                  - "k17user111"
                  - "k17user222"
              format: json
      responses:
        "200":
          description: Success (void)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvexResponse"

  "/api/query#channels:listMembers":
    post:
      operationId: channels_listMembers
      summary: List members of a channel
      tags: [Channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "channels:listMembers"
              args:
                channelId: "k17abc123def456"
              format: json
      responses:
        "200":
          description: Array of channel member summaries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                            name:
                              type: string
                            avatarUrl:
                              type: string
                            role:
                              type: string
                              enum: [admin, member]
                            lastSeenAt:
                              type: number
                            presenceStatus:
                              type: string
                              enum: [online, away, offline]

  "/api/mutation#channels:update":
    post:
      operationId: channels_update
      summary: Update a channel name or description (owner or admin only)
      tags: [Channels]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "channels:update"
              args:
                channelId: "k17abc123def456"
                name: "new-name"
                description: "Updated description"
              format: json
      responses:
        "200":
          description: Success (void)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvexResponse"

  # ── Users ─────────────────────────────────────────────────

  "/api/query#users:getMe":
    post:
      operationId: users_getMe
      summary: Get the currently authenticated user
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "users:getMe"
              args: {}
              format: json
      responses:
        "200":
          description: The current user or null if unauthenticated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        $ref: "#/components/schemas/User"

  "/api/query#users:getByWorkosId":
    post:
      operationId: users_getByWorkosId
      summary: Look up a user by their WorkOS user ID
      tags: [Users]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "users:getByWorkosId"
              args:
                workosUserId: "user_01ABC"
              format: json
      responses:
        "200":
          description: The user document or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        $ref: "#/components/schemas/User"

  "/api/mutation#users:createOrUpdate":
    post:
      operationId: users_createOrUpdate
      summary: Create or update a user record (upsert by WorkOS ID)
      tags: [Users]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "users:createOrUpdate"
              args:
                workosUserId: "user_01ABC"
                email: "alice@example.com"
                name: "Alice"
                avatarUrl: "https://example.com/avatar.png"
              format: json
      responses:
        "200":
          description: The user document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Convex document ID

  # ── Workspaces ────────────────────────────────────────────

  "/api/mutation#workspaces:create":
    post:
      operationId: workspaces_create
      summary: Create a new workspace
      tags: [Workspaces]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "workspaces:create"
              args:
                name: "Acme Corp"
                slug: "acme"
              format: json
      responses:
        "200":
          description: The workspace document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Convex document ID

  "/api/query#workspaces:getBySlug":
    post:
      operationId: workspaces_getBySlug
      summary: Look up a workspace by slug
      tags: [Workspaces]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "workspaces:getBySlug"
              args:
                slug: "default"
              format: json
      responses:
        "200":
          description: The workspace document or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        $ref: "#/components/schemas/Workspace"

  # ── Conversations ─────────────────────────────────────────

  "/api/mutation#conversations:getOrCreateDM":
    post:
      operationId: conversations_getOrCreateDM
      summary: Get or create a direct-message channel with another user
      tags: [Conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "conversations:getOrCreateDM"
              args:
                userId: "k17user111"
              format: json
      responses:
        "200":
          description: The DM channel ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Convex document ID

  "/api/mutation#conversations:createGroup":
    post:
      operationId: conversations_createGroup
      summary: Create a group conversation
      tags: [Conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "conversations:createGroup"
              args:
                name: "Project Alpha"
                memberIds:
                  - "k17user111"
                  - "k17user222"
              format: json
      responses:
        "200":
          description: The group channel ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Convex document ID

  "/api/query#conversations:list":
    post:
      operationId: conversations_list
      summary: List all DM and group conversations for the current user
      tags: [Conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "conversations:list"
              args: {}
              format: json
      responses:
        "200":
          description: Array of conversations with participants and last message
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                            name:
                              type: string
                            type:
                              type: string
                              enum: [dm, group]
                            participants:
                              type: array
                              items:
                                type: object
                                properties:
                                  _id:
                                    type: string
                                  name:
                                    type: string
                                  avatarUrl:
                                    type: string
                            lastMessage:
                              type: object
                              nullable: true
                              properties:
                                body:
                                  type: string
                                authorId:
                                  type: string
                                _creationTime:
                                  type: number
                            unreadCount:
                              type: number

  "/api/mutation#conversations:addMembers":
    post:
      operationId: conversations_addMembers
      summary: Add members to a group conversation
      tags: [Conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "conversations:addMembers"
              args:
                channelId: "k17abc123def456"
                userIds:
                  - "k17user333"
              format: json
      responses:
        "200":
          description: Success (void)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvexResponse"

  "/api/mutation#conversations:removeMember":
    post:
      operationId: conversations_removeMember
      summary: Remove a member from a group conversation (or leave)
      tags: [Conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "conversations:removeMember"
              args:
                channelId: "k17abc123def456"
                userId: "k17user333"
              format: json
      responses:
        "200":
          description: Success (void)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvexResponse"

  "/api/query#conversations:getParticipants":
    post:
      operationId: conversations_getParticipants
      summary: Get participants of a conversation
      tags: [Conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "conversations:getParticipants"
              args:
                channelId: "k17abc123def456"
              format: json
      responses:
        "200":
          description: Array of participant summaries
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: array
                        items:
                          type: object
                          properties:
                            _id:
                              type: string
                            name:
                              type: string
                            avatarUrl:
                              type: string
                            role:
                              type: string
                              enum: [admin, member]
                            lastSeenAt:
                              type: number

  # ── Drafts ────────────────────────────────────────────────

  "/api/mutation#drafts:save":
    post:
      operationId: drafts_save
      summary: Save or update a message draft for a channel
      tags: [Drafts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "drafts:save"
              args:
                channelId: "k17abc123def456"
                body: "Draft message text"
              format: json
      responses:
        "200":
          description: The draft document ID
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: string
                        description: Convex document ID

  "/api/query#drafts:getForChannel":
    post:
      operationId: drafts_getForChannel
      summary: Get the active draft for a channel
      tags: [Drafts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "drafts:getForChannel"
              args:
                channelId: "k17abc123def456"
              format: json
      responses:
        "200":
          description: The draft document or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        $ref: "#/components/schemas/Draft"

  "/api/query#drafts:getAll":
    post:
      operationId: drafts_getAll
      summary: Get all active drafts for the current user
      tags: [Drafts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "drafts:getAll"
              args: {}
              format: json
      responses:
        "200":
          description: Array of active draft documents
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: array
                        items:
                          $ref: "#/components/schemas/Draft"

  "/api/mutation#drafts:dismiss":
    post:
      operationId: drafts_dismiss
      summary: Dismiss a draft
      tags: [Drafts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "drafts:dismiss"
              args:
                draftId: "k17draft111"
              format: json
      responses:
        "200":
          description: Success (void)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvexResponse"

  # ── Inbox ─────────────────────────────────────────────────

  "/api/query#inbox:getInbox":
    post:
      operationId: inbox_getInbox
      summary: Get the user's inbox summaries
      tags: [Inbox]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "inbox:getInbox"
              args: {}
              format: json
      responses:
        "200":
          description: Array of inbox summaries enriched with channel info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        type: array
                        items:
                          $ref: "#/components/schemas/InboxSummary"

  "/api/mutation#inbox:markRead":
    post:
      operationId: inbox_markRead
      summary: Mark an inbox summary as read
      tags: [Inbox]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "inbox:markRead"
              args:
                summaryId: "k17summary111"
              format: json
      responses:
        "200":
          description: Success (void)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvexResponse"

  "/api/mutation#inbox:archive":
    post:
      operationId: inbox_archive
      summary: Archive an inbox summary
      tags: [Inbox]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexMutationRequest"
            example:
              path: "inbox:archive"
              args:
                summaryId: "k17summary111"
              format: json
      responses:
        "200":
          description: Success (void)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvexResponse"

  # ── Integrations ──────────────────────────────────────────

  "/api/query#integrations:getByExternalId":
    post:
      operationId: integrations_getByExternalId
      summary: Look up an integration object by its external ID
      tags: [Integrations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "integrations:getByExternalId"
              args:
                externalId: "github_pr_acme/repo_42"
              format: json
      responses:
        "200":
          description: The integration object or null
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ConvexResponse"
                  - type: object
                    properties:
                      value:
                        $ref: "#/components/schemas/IntegrationObject"

  "/api/query#integrations:listByWorkspace":
    post:
      operationId: integrations_listByWorkspace
      summary: List integration objects for a workspace, optionally filtered by type
      tags: [Integrations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvexQueryRequest"
            example:
              path: "integrations:listByWorkspace"
              args:
