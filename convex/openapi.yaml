  # ── Agent API ────────────────────────────────────────────

  /api/agent/v1/me:
    get:
      operationId: agent_me
      summary: Get agent identity
      tags: [Agent API]
      security:
        - AgentBearerAuth: []
      responses:
        "200":
          description: Agent identity info
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      status:
                        type: string
                  workspace:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string

  /api/agent/v1/channels:
    get:
      operationId: agent_listChannels
      summary: List accessible channels
      tags: [Agent API]
      security:
        - AgentBearerAuth: []
      responses:
        "200":
          description: Array of channels the agent can access
          content:
            application/json:
              schema:
                type: object
                properties:
                  channels:
                    type: array
                    items:
                      $ref: "#/components/schemas/Channel"

  /api/agent/v1/channel-messages:
    get:
      operationId: agent_readChannelMessages
      summary: Read channel messages
      tags: [Agent API]
      security:
        - AgentBearerAuth: []
      parameters:
        - name: channelId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Array of messages from the channel
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
    post:
      operationId: agent_sendChannelMessage
      summary: Send message to channel
      tags: [Agent API]
      security:
        - AgentBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channelId, body]
              properties:
                channelId:
                  type: string
                body:
                  type: string
      responses:
        "200":
          description: The created message ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  messageId:
                    type: string

  /api/agent/v1/conversations:
    get:
      operationId: agent_listConversations
      summary: List agent conversations
      tags: [Agent API]
      security:
        - AgentBearerAuth: []
      responses:
        "200":
          description: Array of direct conversations the agent participates in
          content:
            application/json:
              schema:
                type: object
                properties:
                  conversations:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        name:
                          type: string
                        kind:
                          type: string

  /api/agent/v1/conversation-messages:
    get:
      operationId: agent_readConversationMessages
      summary: Read conversation messages
      tags: [Agent API]
      security:
        - AgentBearerAuth: []
      parameters:
        - name: conversationId
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        "200":
          description: Array of direct messages
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        _id:
                          type: string
                        body:
                          type: string
                        authorId:
                          type: string
                        type:
                          type: string
    post:
      operationId: agent_sendConversationMessage
      summary: Send direct message
      tags: [Agent API]
      security:
        - AgentBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [conversationId, body]
              properties:
                conversationId:
                  type: string
                body:
                  type: string
      responses:
        "200":
          description: The created message ID
          content:
            application/json:
              schema:
                type: object
                properties:
                  messageId:
                    type: string

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Convex auth token (JWT)
    AgentBearerAuth:
      type: http
      scheme: bearer
      description: Agent API token (ping_ag_...)

  schemas:
    # ── Convex envelope schemas ─────────────────────────────

    ConvexQueryRequest:
      type: object
      required: [path, args, format]
      properties:
        path:
          type: string
          description: "Convex function path (e.g. 'messages:listByChannel')"
        args:
          type: object
          description: Arguments to pass to the function
        format:
          type: string
          enum: [json]
          default: json

    ConvexMutationRequest:
      type: object
      required: [path, args, format]
      properties:
        path:
          type: string
          description: "Convex function path (e.g. 'messages:send')"
        args:
          type: object
          description: Arguments to pass to the function
        format:
          type: string
          enum: [json]
          default: json

    ConvexResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, error]
        value:
          description: The return value of the function (type varies)
        errorMessage:
          type: string
          description: Present when status is "error"

    # ── Domain model schemas (derived from schema.ts) ───────

    User:
      type: object
      required:
        - _id
        - _creationTime
        - workosUserId
        - email
        - name
        - role
        - workspaceId
        - status
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        workosUserId:
          type: string
        email:
          type: string
        name:
          type: string
        avatarUrl:
          type: string
        role:
          type: string
          enum: [admin, member]
        workspaceId:
          type: string
          description: Convex document ID
        status:
          type: string
          enum: [active, invited, deactivated]
        lastSeenAt:
          type: number
        presenceStatus:
          type: string
          enum: [online, away, offline]
        statusMessage:
          type: string
        statusEmoji:
          type: string

    Workspace:
      type: object
      required:
        - _id
        - _creationTime
        - name
        - slug
        - createdBy
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        name:
          type: string
        slug:
          type: string
        workosOrgId:
          type: string
        createdBy:
          type: string
          description: Convex document ID
        integrations:
          type: object
          additionalProperties: true

    Channel:
      type: object
      required:
        - _id
        - _creationTime
        - name
        - workspaceId
        - createdBy
        - isDefault
        - isArchived
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        name:
          type: string
        description:
          type: string
        workspaceId:
          type: string
          description: Convex document ID
        createdBy:
          type: string
          description: Convex document ID
        isDefault:
          type: boolean
        isArchived:
          type: boolean
        type:
          type: string
          enum: [public, dm, group]

    Message:
      type: object
      required:
        - _id
        - _creationTime
        - channelId
        - authorId
        - body
        - type
        - isEdited
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        channelId:
          type: string
          description: Convex document ID
        authorId:
          type: string
          description: Convex document ID
        body:
          type: string
        type:
          type: string
          enum: [user, bot, system, integration]
        integrationObjectId:
          type: string
          description: Convex document ID
        citations:
          type: array
          items:
            type: object
            required: [text]
            properties:
              text:
                type: string
              sourceUrl:
                type: string
              sourceTitle:
                type: string
        mentions:
          type: array
          items:
            type: string
        graphitiEpisodeId:
          type: string
        isEdited:
          type: boolean

    Draft:
      type: object
      required:
        - _id
        - _creationTime
        - userId
        - channelId
        - body
        - contextSnapshot
        - suggestedCompletion
        - status
        - createdAt
        - updatedAt
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        userId:
          type: string
          description: Convex document ID
        channelId:
          type: string
          description: Convex document ID
        body:
          type: string
        replyToMessageId:
          type: string
          description: Convex document ID
        contextSnapshot:
          type: string
        suggestedCompletion:
          type: string
        status:
          type: string
          enum: [active, dismissed, sent]
        createdAt:
          type: number
        updatedAt:
          type: number

    InboxSummary:
      type: object
      required:
        - _id
        - _creationTime
        - userId
        - channelId
        - bullets
        - messageCount
        - periodStart
        - periodEnd
        - isRead
        - isArchived
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        userId:
          type: string
          description: Convex document ID
        channelId:
          type: string
          description: Convex document ID
        bullets:
          type: array
          items:
            type: object
            required: [text, priority, relatedMessageIds]
            properties:
              text:
                type: string
              priority:
                type: string
                enum: [high, medium, low]
              relatedMessageIds:
                type: array
                items:
                  type: string
                  description: Convex document ID
        messageCount:
          type: number
        periodStart:
          type: number
        periodEnd:
          type: number
        isRead:
          type: boolean
        isArchived:
          type: boolean
        actionItems:
          type: array
          items:
            type: object
            required: [text]
            properties:
              text:
                type: string
              assignee:
                type: string
              relatedIntegrationObjectId:
                type: string
                description: Convex document ID
        channel:
          type: object
          description: Enriched channel info (added by getInbox)
          properties:
            _id:
              type: string
            name:
              type: string
            description:
              type: string

    IntegrationObject:
      type: object
      required:
        - _id
        - _creationTime
        - workspaceId
        - type
        - externalId
        - title
        - status
        - url
        - author
        - metadata
        - lastSyncedAt
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        workspaceId:
          type: string
          description: Convex document ID
        type:
          type: string
          enum: [github_pr, linear_ticket]
        externalId:
          type: string
        title:
          type: string
        status:
          type: string
        url:
          type: string
        author:
          type: string
        metadata:
          type: object
          additionalProperties: true
        lastSyncedAt:
          type: number
        graphitiEpisodeId:
          type: string

    ProactiveAlert:
      type: object
      required:
        - _id
        - _creationTime
        - userId
        - workspaceId
        - type
        - channelId
        - title
        - body
        - suggestedAction
        - priority
        - status
        - expiresAt
        - createdAt
      properties:
        _id:
          type: string
          description: Convex document ID
        _creationTime:
          type: number
        userId:
          type: string
          description: Convex document ID
